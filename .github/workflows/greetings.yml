name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Please let us know what you have changed in the teams chat' first issue"
        pr-message: "Let us know in the teams chat why you made this pull request so we can edit it as team' first pull request"
